name: Capturar API Technogym

# One-shot: parchea Technogym con frida-gadget, arranca emulador con mitmproxy
# y captura el tráfico HTTPS desbloqueando el SSL pinning.
# Lanzar manualmente desde Actions → "Capturar API Technogym" → Run workflow.

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
                      /opt/ghc /usr/share/swift /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/powershell /usr/local/lib/node_modules \
                      /opt/microsoft
          docker system prune -af 2>/dev/null || true
          df -h

      - name: Add swap (12GB)
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /mnt/swapfile /swapfile
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          sudo sysctl vm.swappiness=80
          free -h

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb openssl apksigner zipalign aapt
          sudo systemctl stop snapd.service snapd.socket unattended-upgrades.service 2>/dev/null || true

      - name: Start virtual display
        run: |
          Xvfb :0 -screen 0 1280x800x24 &
          echo "DISPLAY=:0" >> $GITHUB_ENV

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install uiautomator2 mitmproxy objection frida-tools

      - name: Pre-generate mitmproxy CA cert
        run: |
          mkdir -p ~/.mitmproxy
          timeout 5 mitmdump --listen-port 8080 --set confdir=~/.mitmproxy >/dev/null 2>&1 || true
          ls -la ~/.mitmproxy/
          # Cert para instalar como user-cert en Android (no necesita root)
          openssl x509 -in ~/.mitmproxy/mitmproxy-ca-cert.pem -outform DER -out ~/.mitmproxy/mitm-ca.crt

      - name: Install apktool (needed by objection)
        run: |
          sudo apt-get install -y default-jre-headless
          curl -fL -o /tmp/apktool.jar \
            "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"
          sudo mv /tmp/apktool.jar /usr/local/bin/apktool.jar
          # Wrapper script
          sudo tee /usr/local/bin/apktool >/dev/null <<'EOF'
          #!/bin/sh
          exec java -jar /usr/local/bin/apktool.jar "$@"
          EOF
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Patch Technogym APK with frida-gadget
        run: |
          set -e
          # objection patchapk inyecta libfrida-gadget.so en el APK base.
          objection patchapk \
            --source technogym-3.43.2-xapk/com.technogym.tgapp.apk \
            --architecture x86_64 \
            --use-aapt2
          # objection deja el APK como NOMBRE.objection.apk
          ls -la technogym-3.43.2-xapk/*.objection.apk *.objection.apk 2>/dev/null || true
          if [ -f technogym-3.43.2-xapk/com.technogym.tgapp.objection.apk ]; then
            mv technogym-3.43.2-xapk/com.technogym.tgapp.objection.apk patched-base.apk
          elif [ -f com.technogym.tgapp.objection.apk ]; then
            mv com.technogym.tgapp.objection.apk patched-base.apk
          else
            echo "ERROR: no .objection.apk produced"
            exit 1
          fi
          ls -la patched-base.apk

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Start emulator + capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          heap-size: 576M
          avd-name: CaptureAVD
          emulator-options: -no-snapshot-load -no-snapshot-save -no-audio -no-metrics -no-boot-anim -gpu swiftshader_indirect -no-window -memory 4096 -cores 2 -camera-back none -camera-front none -netfast -no-sim -no-passive-gps -http-proxy 10.0.2.2:8080
          disable-animations: true
          script: bash capture_api.sh

      - name: Upload capture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-capture-${{ github.run_id }}
          path: |
            mitm_flows.dump
            mitm_flows.txt
            capture.log
            screenshots/
          retention-days: 30
