name: Gym Bot Reserva

on:
  schedule:
    # Domingo 21:40 Madrid (UTC+2 verano = 19:40 UTC) → Body Tono lunes 18:00
    - cron: '40 19 * * 0'
    # Martes 21:40 Madrid → Body Tono miércoles 18:00
    - cron: '40 19 * * 2'
    # Miércoles 21:40 Madrid → POWER jueves 19:00
    - cron: '40 19 * * 3'
  workflow_dispatch:
    inputs:
      force_class:
        description: 'Forzar clase: "NOMBRE,HH:MM,dia_semana" (ej: POWER,19:00,3)'
        required: false
        default: ''

jobs:
  reserva:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_CLASS:       ${{ github.event.inputs.force_class }}
      GEELARK_APP_ID:    ${{ secrets.GEELARK_APP_ID }}
      GEELARK_API_KEY:   ${{ secrets.GEELARK_API_KEY }}
      GEELARK_PHONE_ID:  ${{ secrets.GEELARK_PHONE_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install uiautomator2 requests

      - name: Install ADB
        run: |
          sudo apt-get update -q
          sudo apt-get install -y adb

      - name: Run bot
        run: python gym_bot.py

      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            login_failed_hierarchy.xml
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym-bot-log-${{ github.run_id }}
          path: gym_bot.log
          retention-days: 30
