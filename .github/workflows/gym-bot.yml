name: Gym Bot Reserva

on:
  schedule:
    # Domingo 21:40 Madrid (UTC+2 verano = 19:40 UTC) → Body Tono lunes 18:00
    - cron: '40 19 * * 0'
    # Martes 21:40 Madrid → Body Tono miércoles 18:00
    - cron: '40 19 * * 2'
    # Miércoles 21:40 Madrid → POWER jueves 19:00
    - cron: '40 19 * * 3'
  workflow_dispatch:
    inputs:
      force_class:
        description: 'Forzar clase: "NOMBRE,HH:MM,dia_semana" (ej: CICLO,18:00,3)'
        required: false
        default: ''

jobs:
  reserva:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_CLASS: ${{ github.event.inputs.force_class }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          # Solo librerías mínimas para Xvfb y Qt/xcb del emulador; sin pulseaudio
          # porque el emulador se lanza con -no-audio
          sudo apt-get install -y xvfb libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0
          # Liberar RAM del host: snapd y unattended-upgrades no se necesitan en CI
          sudo systemctl stop snapd.service snapd.socket unattended-upgrades.service 2>/dev/null || true

      - name: Start virtual display
        run: |
          Xvfb :0 -screen 0 1280x800x24 &
          echo "DISPLAY=:0" >> $GITHUB_ENV

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm
          ls -la /dev/kvm  # confirmar permisos aplicados

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install uiautomator2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android emulator image
        run: |
          sdkmanager --install \
            "system-images;android-34;google_apis_playstore;x86_64" \
            "emulator" \
            "platform-tools"

      - name: Create AVD
        run: |
          echo no | avdmanager create avd \
            --name GymBotPlayAVD \
            --package "system-images;android-34;google_apis_playstore;x86_64" \
            --device "pixel_2" \
            --force
          # Tuning de memoria — debe hacerse DESPUÉS de create avd
          # ANDROID_AVD_HOME lo fija android-actions/setup-android; usarlo es más fiable que $HOME
          CONFIG="${ANDROID_AVD_HOME:-$HOME/.android/avd}/GymBotPlayAVD.avd/config.ini"
          echo "Tuning config: $CONFIG"
          # 3072M deja ~2.5 GB libres para el host (Python + adb + Xvfb)
          sed -i 's/^hw\.ramSize=.*/hw.ramSize=3072/' "$CONFIG"
          sed -i 's/^vm\.heapSize=.*/vm.heapSize=512/' "$CONFIG"
          echo "hw.camera.back=none"  >> "$CONFIG"
          echo "hw.camera.front=none" >> "$CONFIG"
          sed -i 's/^hw\.cpu\.ncore=.*/hw.cpu.ncore=2/' "$CONFIG"
          echo "--- AVD config (memory/camera/cores) ---"
          grep -E 'ramSize|heapSize|camera|ncore' "$CONFIG"

      - name: Start emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_2
          ram-size: 3072M
          heap-size: 512M
          avd-name: GymBotPlayAVD
          emulator-options: -no-snapshot-load -no-snapshot-save -no-audio -no-metrics -no-boot-anim -gpu swiftshader_indirect -no-window -no-accel
          disable-animations: true
          script: bash run_bot.sh

      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            login_failed_hierarchy.xml
            postlogin_iter*.xml
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym-bot-log-${{ github.run_id }}
          path: gym_bot.log
          retention-days: 30
