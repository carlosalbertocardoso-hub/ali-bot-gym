name: Gym Bot Reserva

on:
  schedule:
    # Domingo 21:40 Madrid (UTC+2 verano = 19:40 UTC) → Body Tono lunes 18:00
    - cron: '40 19 * * 0'
    # Martes 21:40 Madrid → Body Tono miércoles 18:00
    - cron: '40 19 * * 2'
    # Miércoles 21:40 Madrid → POWER jueves 19:00
    - cron: '40 19 * * 3'
  workflow_dispatch:
    inputs:
      force_class:
        description: 'Forzar clase: "NOMBRE,HH:MM,dia_semana" (ej: CICLO,18:00,3)'
        required: false
        default: ''

jobs:
  reserva:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_CLASS: ${{ github.event.inputs.force_class }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        run: |
          # El emulador API 34 necesita ~10 GB para la partición userdata.
          # ubuntu-latest viene con herramientas que no usamos y consumen 20+ GB.
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android/sdk/ndk \
                      /opt/ghc \
                      /usr/share/swift \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/powershell \
                      /usr/local/lib/node_modules \
                      /opt/microsoft
          docker system prune -af 2>/dev/null || true
          df -h

      - name: Add swap (8GB) to survive emulator memory spikes
        run: |
          # ubuntu-latest tiene ~16GB RAM pero 0 swap. El emulador Android 14
          # puede pegar picos de 5-6GB y matar a otros procesos vía OOM killer.
          # Con 8GB swap aguantamos los picos sin perder el adb daemon.
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo sysctl vm.swappiness=60
          free -h

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0
          sudo systemctl stop snapd.service snapd.socket unattended-upgrades.service 2>/dev/null || true

      - name: Start virtual display
        run: |
          Xvfb :0 -screen 0 1280x800x24 &
          echo "DISPLAY=:0" >> $GITHUB_ENV

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm
          ls -la /dev/kvm  # confirmar permisos aplicados

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install uiautomator2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Start emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          heap-size: 576M
          avd-name: GymBotPlayAVD
          emulator-options: -no-snapshot-load -no-snapshot-save -no-audio -no-metrics -no-boot-anim -gpu swiftshader_indirect -no-window -memory 4096 -cores 2 -camera-back none -camera-front none -netfast -no-sim -no-passive-gps
          disable-animations: true
          script: bash run_bot.sh

      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            login_failed_hierarchy.xml
            postlogin_iter*.xml
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym-bot-log-${{ github.run_id }}
          path: gym_bot.log
          retention-days: 30
