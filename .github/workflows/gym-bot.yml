name: Gym Bot Reserva

on:
  schedule:
    # Domingo 21:40 Madrid (UTC+2 verano = 19:40 UTC) → Body Tono lunes 18:00
    - cron: '40 19 * * 0'
    # Martes 21:40 Madrid → Body Tono miércoles 18:00
    - cron: '40 19 * * 2'
    # Miércoles 21:40 Madrid → POWER jueves 19:00
    - cron: '40 19 * * 3'
  workflow_dispatch:
    inputs:
      force_class:
        description: 'Forzar clase: "NOMBRE,HH:MM,dia_semana" (ej: CICLO,18:00,3)'
        required: false
        default: ''

jobs:
  reserva:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_CLASS: ${{ github.event.inputs.force_class }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libpulse0 pulseaudio xvfb libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0

      - name: Start virtual display
        run: |
          Xvfb :0 -screen 0 1280x800x24 &
          echo "DISPLAY=:0" >> $GITHUB_ENV

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install uiautomator2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android emulator image
        run: |
          sdkmanager --install \
            "system-images;android-34;google_apis;x86_64" \
            "emulator" \
            "platform-tools"

      - name: Create AVD
        run: |
          echo no | avdmanager create avd \
            --name GymBotPlayAVD \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_2" \
            --force

      - name: Start emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          heap-size: 512M
          avd-name: GymBotPlayAVD
          emulator-options: -no-snapshot-load -no-audio -no-metrics -gpu swiftshader_indirect
          disable-animations: true
          script: bash run_bot.sh

      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            login_failed_hierarchy.xml
            postlogin_iter*.xml
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym-bot-log-${{ github.run_id }}
          path: gym_bot.log
          retention-days: 30
