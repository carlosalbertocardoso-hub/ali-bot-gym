name: Gym Bot Reserva

on:
  schedule:
    # Domingo 21:40 Madrid (UTC+2 verano = 19:40 UTC) → Body Tono lunes 18:00
    - cron: '40 19 * * 0'
    # Martes 21:40 Madrid → Body Tono miércoles 18:00
    - cron: '40 19 * * 2'
    # Miércoles 21:40 Madrid → POWER jueves 19:00
    - cron: '40 19 * * 3'
  workflow_dispatch:
    inputs:
      force_class:
        description: 'Forzar clase: "NOMBRE,HH:MM,dia_semana" (ej: CICLO,18:00,3)'
        required: false
        default: ''

jobs:
  reserva:
    # macos-13 (Intel) trae HVF nativo y emulador Android estable. ubuntu-latest
    # se queda sin RAM cuando Technogym renderiza la home y mata al adbd.
    runs-on: macos-13
    timeout-minutes: 45
    env:
      FORCE_CLASS: ${{ github.event.inputs.force_class }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Show host resources
        run: |
          sysctl -n hw.memsize hw.ncpu
          df -h /

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install uiautomator2

      - name: Start emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          heap-size: 576M
          avd-name: GymBotPlayAVD
          # En macOS-13 el emulador usa HVF. No hace falta -no-window porque ya es headless por defecto en CI;
          # tampoco -gpu swiftshader_indirect (HVF acelera la GPU nativa).
          emulator-options: -no-snapshot-load -no-snapshot-save -no-audio -no-metrics -no-boot-anim -no-window -memory 4096 -cores 2 -camera-back none -camera-front none -netfast -no-sim -no-passive-gps
          disable-animations: true
          script: bash run_bot.sh

      - name: Upload screenshots on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: |
            screenshots/
            login_failed_hierarchy.xml
            postlogin_iter*.xml
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gym-bot-log-${{ github.run_id }}
          path: gym_bot.log
          retention-days: 30
